<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Categorías</title>

  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --danger: #dc2626;
      --warning: #f59e0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      padding: 30px;
      color: var(--text);
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: var(--card);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-refresh {
      width: 100%;
      margin-bottom: 15px;
      background: #10b981;
      color: white;
    }

    ul {
      list-style: none;
    }

    li {
      background: #f9fafb;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .acciones button {
      margin-left: 5px;
      font-size: 12px;
    }

    .btn-edit {
      background: var(--warning);
      color: white;
    }

    .btn-delete {
      background: var(--danger);
      color: white;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>Gestión de Categorías</h1>

    <!-- CREATE -->
    <div class="form">
      <input id="descripcion" placeholder="Escribe una categoría">
      <button class="btn-primary" onclick="crearCategoria()">Agregar</button>
    </div>

    <!-- READ -->
    <button class="btn-refresh" onclick="obtenerCategorias()">Actualizar lista</button>

    <!-- LIST -->
    <ul id="lista"></ul>

  </div>
</div>

<script>
  const API = "https://alvaroutos.onrender.com";

  // GET
  async function obtenerCategorias() {
    const res = await fetch(API);
    const data = await res.json();

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(cat => {
      lista.innerHTML += `
        <li>
          <span>${cat.descripcion}</span>

          <div class="acciones">
            <button class="btn-edit" onclick="editar(${cat.id_categoria})">Editar</button>
            <button class="btn-delete" onclick="eliminar(${cat.id_categoria})">Eliminar</button>
          </div>
        </li>
      `;
    });
  }

  // POST
  async function crearCategoria() {
    const descripcion = document.getElementById("descripcion").value;

    if (!descripcion) return alert("Escribe algo");

    await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ descripcion })
    });

    document.getElementById("descripcion").value = "";
    obtenerCategorias();
  }

  // DELETE
  async function eliminar(id) {
    await fetch(`${API}/${id}`, {
      method: "DELETE"
    });

    obtenerCategorias();
  }

  // PUT
  async function editar(id) {
    const nueva = prompt("Nueva descripción:");

    if (!nueva) return;

    await fetch(`${API}/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ descripcion: nueva })
    });

    obtenerCategorias();
  }

  // Carga inicial
  obtenerCategorias();
</script>

</body>
</html>
