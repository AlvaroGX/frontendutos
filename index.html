<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Categorías</title>

  <style>
    body {
      background: #f3f4f6;
      font-family: sans-serif;
      padding: 30px;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
    }

    button {
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #eee;
      margin-bottom: 8px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Categorías</h2>

  <input id="descripcion" placeholder="Nueva categoría">
  <button onclick="crearCategoria()">Agregar</button>

  <button onclick="obtenerCategorias()">Cargar</button>

  <ul id="lista"></ul>
</div>

<script>
  const API = "https://alvaroutos.onrender.com/categorias";

  // GET
  async function obtenerCategorias() {
    try {
      const res = await fetch(API);

      if (!res.ok) {
        throw new Error("Error en el servidor");
      }

      const data = await res.json();

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      if (!data.length) {
        lista.innerHTML = "<li>No hay datos</li>";
        return;
      }

      data.forEach(cat => {
        lista.innerHTML += `
          <li>
            ${cat.descripcion}
            <div>
              <button onclick="editar(${cat.id_categoria})">✏</button>
              <button onclick="eliminar(${cat.id_categoria})">🗑</button>
            </div>
          </li>
        `;
      });

    } catch (error) {
      console.error(error);
      alert("Error cargando datos");
    }
  }

  // POST
  async function crearCategoria() {
    const descripcion = document.getElementById("descripcion").value;

    if (!descripcion) return alert("Escribe algo");

    try {
      await fetch(API, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ descripcion })
      });

      document.getElementById("descripcion").value = "";
      obtenerCategorias();

    } catch (error) {
      console.error(error);
      alert("Error al crear");
    }
  }

  // DELETE
  async function eliminar(id) {
    try {
      await fetch(`${API}/${id}`, {
        method: "DELETE"
      });

      obtenerCategorias();

    } catch (error) {
      console.error(error);
    }
  }

  // PUT
  async function editar(id) {
    const nueva = prompt("Nueva descripción:");
    if (!nueva) return;

    try {
      await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ descripcion: nueva })
      });

      obtenerCategorias();

    } catch (error) {
      console.error(error);
    }
  }

  // AUTO LOAD
  obtenerCategorias();
</script>

</body>
</html>
